<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>demo - 03</title>
    <style>
      * {
        margin: 0;
      }

      body {
        background: white;
        font-family: sans-serif;
        font-weight: 700;
      }

      main {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(300px, 100%), 1fr));
        max-width: 1300px;
        gap: 48px;
        margin: 40px auto;
        padding-inline: 16px;
      }

      .wrap {
        display: grid;
        grid-template-rows: subgrid;
        grid-row: span 3;
        gap: 12px;
      }

      .label {
        font-size: 32px;
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(5, 1fr);
        row-rule: 3px solid orange;
        column-rule: 3px solid green;
        rule-break: intersection;

        /* 01 */
        &.grid-01 {
          rule-inset: 12px; /* 行・列の罫線 12px短くする */
        }

        /* 02 */
        &.grid-02 {
          row-rule-inset-junction: 12px; /* 行の罫線 交点のみ12px短くする */
          column-rule-inset-cap: 24px; /* 列の罫線 終端のみ24px短くする */
        }

        .grid-item {
          background: #ddd;
          aspect-ratio: 1 / 1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="wrap">
        <p class="label">01</p>
        <p>rule-inset: 8px;</p>
        <div class="grid grid-01">
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
        </div>
      </div>

      <div class="wrap">
        <p class="label">02</p>
        <p>column-rule-inset-cap: 24px;<br />row-rule-inset-junction: 12px;</p>
        <div class="grid grid-02">
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
        </div>
      </div>
    </main>
  </body>
</html>
