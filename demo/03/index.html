<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>demo - 03</title>
    <style>
      body {
        margin: 0;
        background: white;
        font-family: sans-serif;
      }

      main {
        max-width: 600px;
        margin: 40px auto;
        padding-inline: 16px;
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(5, 1fr);
        column-rule: 3px solid green; /* 縦の罫線 */
        row-rule: 3px solid red; /* 横の罫線 */
        rule-break: intersection; /* 交差は重ならないようにする */
        rule-inset: 4px; /* 罫線の両端を4pxずつ短くする */
        column-rule-visibility-items: around; /* 縦線のどちらか一方が要素と隣接していると表示 */
        row-rule-visibility-items: between; /* 横線の上下が要素と隣接していると表示 */

        .grid-item {
          background: #ddd;
          aspect-ratio: 1 / 1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="grid">
        <div class="grid-item" style="grid-column: 2; grid-row: 5"></div>
        <div class="grid-item" style="grid-column: 4; grid-row: 1"></div>
        <div class="grid-item" style="grid-column: 1; grid-row: 3"></div>
        <div class="grid-item" style="grid-column: 5; grid-row: 4"></div>
        <div class="grid-item" style="grid-column: 3; grid-row: 2"></div>
        <div class="grid-item" style="grid-column: 2; grid-row: 1"></div>
        <div class="grid-item" style="grid-column: 4; grid-row: 5"></div>
        <div class="grid-item" style="grid-column: 5; grid-row: 2"></div>
        <div class="grid-item" style="grid-column: 1; grid-row: 4"></div>
        <div class="grid-item" style="grid-column: 3; grid-row: 5"></div>
        <div class="grid-item" style="grid-column: 4; grid-row: 3"></div>
        <div class="grid-item" style="grid-column: 1; grid-row: 1"></div>
        <div class="grid-item" style="grid-column: 3; grid-row: 4"></div>
        <div class="grid-item" style="grid-column: 2; grid-row: 2"></div>
        <div class="grid-item" style="grid-column: 5; grid-row: 5"></div>
      </div>
    </main>
  </body>
</html>
