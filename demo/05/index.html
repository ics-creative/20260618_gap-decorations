<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>demo - 05</title>
    <style>
      * {
        margin: 0;
      }

      body {
        background: white;
        font-family: sans-serif;
        font-weight: bold;
      }

      main {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(300px, 100%), 1fr));
        max-width: 1300px;
        gap: 48px;
        margin: 40px auto;
        padding-inline: 16px;
      }

      .wrap {
        display: grid;
        gap: 12px;
      }

      .label {
        font-size: 32px;
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(5, 1fr);
        column-rule: 3px solid green;
        row-rule: 3px solid orange;

        /* 01 */
        &.grid-01 {
          rule-overlap: row-over-column; /* 初期値 */
        }

        /* 02 */
        &.grid-02 {
          rule-overlap: column-over-row; /* 列を行の上に重ねて表示 */
        }

        .grid-item {
          background: #ddd;
          aspect-ratio: 1 / 1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="wrap">
        <p class="label">01</p>
        <p>rule-overlap: row-over-column;</p>
        <div class="grid grid-01">
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
        </div>
      </div>

      <div class="wrap">
        <p class="label">02</p>
        <p>rule-overlap: column-over-row;</p>
        <div class="grid grid-02">
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
        </div>
      </div>
    </main>
  </body>
</html>
