<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>demo - 02</title>
    <style>
      * {
        margin: 0;
      }

      body {
        background: white;
        font-family: sans-serif;
        font-weight: 700;
      }

      main {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(300px, 100%), 1fr));
        max-width: 1300px;
        gap: 48px;
        margin: 40px auto;
        padding-inline: 16px;
      }

      .wrap {
        display: grid;
        grid-template-rows: subgrid;
        grid-row: span 3;
        gap: 12px;
      }

      .label {
        font-size: 32px;
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(5, 1fr);
        column-rule: 3px solid green;
        row-rule: 3px solid orange;

        /* 01 */
        &.grid-01 {
          rule-break: intersection; /* 列行の罫線 交点で分割 */
        }

        /* 02 */
        &.grid-02 {
          column-rule-break: intersection; /* 列の罫線 交点で分割 */
          row-rule-break: normal; /* 行の罫線 T字交点のみで分割 */
        }

        .grid-item {
          background: #ddd;
          aspect-ratio: 1 / 1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="wrap">
        <p class="label">01</p>
        <p class="description">rule-break: intersection;</p>
        <div class="grid grid-01">
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
        </div>
      </div>

      <div class="wrap">
        <p class="label">02</p>
        <p class="description">
          column-rule-break: intersection;<br />
          row-rule-break: normal;
        </p>
        <div class="grid grid-02">
          <div class="grid-item" style="grid-column: 1/4; grid-row: 1/4"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
        </div>
      </div>
    </main>
  </body>
</html>
